[defaults]
# URL to encode
url = https://example.com

# Foreground colour: named colour or hex code (e.g. black, #000000)
foreground = black

# Background colour: named colour, hex code, or "transparent"
background = white

# Error correction level: L (7%), M (15%), Q (25%), H (30%)
error_correction = L

# Size of each QR box in pixels (1-20)
box_size = 10

# Width of the quiet-zone border (number of boxes)
border = 2
